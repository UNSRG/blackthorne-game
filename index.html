<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Используем самый стабильный в мире веб-плеер ретро-игр, который сам всё настроит -->
        <iframe 
            src="https://emulatorjs.org" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
