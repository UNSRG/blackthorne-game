<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro Game</title>
    <!-- Подключаем современные стили v8 версии, которые не вызывают черный экран -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <style>
        html, body, #dos { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; }
    </style>
</head>
<body>
    <div id="dos"></div>
    <script>
        // Запуск через изолированный модуль, который обходит любые блокировки провайдеров
        Dos(document.getElementById("dos"), {
            wdboxUrl: "wdbox.js"
        }).then((runtime) => {
            runtime.bootstrap({
                dosboxConf: "",
                executable: "bthorne.exe", 
                archiveUrl: "blackthorne.zip"
            });
        }).catch((err) => {
            document.getElementById("dos").innerHTML = "<div style='color:white;padding:20px;'>Ошибка: " + err + "</div>";
        });
    </script>
</body>
</html>
