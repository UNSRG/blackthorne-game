<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro Game</title>
    <link rel="stylesheet" href="js-dos.css">
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; }
    </style>
</head>
<body>
    <div id="jsdos"></div>

    <!-- Загружаем базовый модуль эмулятора, минуя внешние запросы -->
    <script type="module">
        import { SimpleDos } from "./wddosbox-x.js";

        window.addEventListener("load", () => {
            const container = document.getElementById("jsdos");
            
            // Запуск напрямую через wddosbox-x без посредников
            SimpleDos(container, {
                packageUrl: "blackthorne.zip",
                args: ["bthorne.exe"]
            }).catch((err) => {
                container.innerHTML = "<div style='color:white;padding:20px;'>Ошибка: " + err + "</div>";
            });
        });
    </script>
</body>
</html>
