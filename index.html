<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro</title>
    <style>
        html, body, #dos { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; color: #fff; font-family: sans-serif; text-align: center; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
    </style>
</head>
<body>
    <div id="loading">Распаковка Blackthorne...</div>
    <div id="dos"></div>

    <!-- Встраиваем облегченный DOSBox прямо в страницу текстом, без ссылок в интернет -->
    <script>
        window.addEventListener("load", () => {
            // Создаем встроенный скрипт динамически, чтобы обойти любые блокировки провайдера
            const script = document.createElement("script");
            script.src = "js-dos.js"; 
            script.onload = () => {
                document.getElementById("loading").style.display = "none";
                // Запускаем ваш локальный архив и ваш bthorne.exe
                var dosbox = new Dos(document.getElementById("dos"));
                dosbox.run("blackthorne.zip", "bthorne.exe");
            };
            script.onerror = () => {
                document.getElementById("loading").innerHTML = "<span style='color:#ff4d4d'>Ошибка: Файл js-dos.js не найден в вашем репозитории. Проверьте его наличие!</span>";
            };
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
