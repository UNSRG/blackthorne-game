<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro</title>
    <!-- Полностью автономный плеер DOSBox, скомпилированный прямо в страницу -->
    <script src="https://jsdelivr.net"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>
    <div id="loading">Загрузка эмулятора и Blackthorne...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        window.addEventListener("load", () => {
            // Используем альтернативный, максимально легкий движок Emularity
            const dosbox = new DosBox({
                canvas: document.getElementById("canvas"),
                onload: (box) => {
                    document.getElementById("loading").style.display = "none";
                    // Извлекаем архив и запускаем игру напрямую
                    box.run("blackthorne.zip", ["bthorne.exe"]);
                },
                onerror: (err) => {
                    document.getElementById("loading").innerText = "Ошибка: " + err;
                }
            });
        });
    </script>
</body>
</html>
