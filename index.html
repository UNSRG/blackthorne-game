<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne</title>
    <link rel="stylesheet" href="https://js-dos.com">
    <script src="https://js-dos.com"></script>
    <style>
        html, body, #dos { width: 100%; height: 100%; margin: 0; padding: 0; background: black; overflow: hidden; }
    </style>
</head>
<body>
    <div id="dos"></div>
    <script>
        Dos(document.getElementById("dos"), {
            wdboxUrl: "https://js-dos.com"
        }).then((runtime) => {
            runtime.bootstrap({
                dosboxConf: "",
                executable: "bthorne.exe", // Изменено на маленькие буквы под ваш архив
                archiveUrl: "blackthorne.zip"
            });
        });
    </script>
</body>
</html>
