<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro</title>
    <!-- Подключаем самую стабильную облегченную сборку JS-DOS напрямую с серверов jsDelivr -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <style>
        html, body, #dos { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; }
    </style>
</head>
<body>
    <div id="dos"></div>
    <script>
        // Специальная проверенная версия 6, которая работает без дополнительных WASM файлов на лету
        var dosbox = new Dos(document.getElementById("dos"), {
            wdboxUrl: "https://jsdelivr.net"
        });
        
        dosbox.run("blackthorne.zip", "bthorne.exe");
    </script>
</body>
</html>
