<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackthorne Retro Game</title>
    <!-- Используем глобальный и самый стабильный CDN Unpkg, который отдаёт готовую v7 сборку -->
    <link rel="stylesheet" href="https://unpkg.com">
    <script src="https://unpkg.com"></script>
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; position: fixed; }
    </style>
</head>
<body>
    <div id="jsdos"></div>
    <script>
        // Запускаем эмулятор через зеркало Unpkg, обходя блокировки основного сайта js-dos
        Dos(document.getElementById("jsdos"), {
            wdboxUrl: "https://unpkg.com"
        }).then((runtime) => {
            runtime.run("blackthorne.zip", "bthorne.exe");
        }).catch((err) => {
            document.getElementById("jsdos").innerHTML = "<div style='color:white;padding:20px;font-family:sans-serif;'>Ошибка запуска: " + err + "</div>";
        });
    </script>
</body>
</html>
